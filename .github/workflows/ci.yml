name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (schema sanity)
        run: |
          python - <<'PY'
          import sqlite3
          conn = sqlite3.connect(":memory:")
          with open("schema.sql", "r", encoding="utf-8") as f:
              conn.executescript(f.read())
          print("Schema loaded OK")
          PY
      - name: Validate MCP tools
        run: python scripts/validate_tools.py

  nextjs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build python image
        run: docker build -t mcp-server:ci .
      - name: Build next image
        run: docker build -t mcp-ui:ci ./next-app
